name: Price Tracker Scanner

on:
  push:
    branches: [ main ]
  schedule:
    # Esegue ogni 15 minuti automaticamente
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pages: write
  deployments: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run Price Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python run_once.py

      - name: Build Static Dashboard for GitHub Pages
        run: |
          python export_pages.py

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: 'public'

      - name: Save Sent History to Main Branch
        run: |
          git config --global user.name "mich-de"
          git config --global user.email "mic.deangelis@gmail.com"
          git add -f data/sent_items.json data/*_results.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Chore: Save sent items history [skip ci]"
          git push origin main || true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5

      - name: Cleanup Old Deployments Automatically
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOYS=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/mich-de/subito/deployments" | jq -r '.[].id')
          for id in $DEPLOYS; do
            curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/mich-de/subito/deployments/$id/statuses" -d '{"state":"inactive"}'
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/mich-de/subito/deployments/$id"
          done
